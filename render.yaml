services:
  - type: web
    name: fiat-lux
    runtime: python
    region: oregon
    rootDir: webapp
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --preload --timeout 120
    disk:
      name: data
      mountPath: /opt/render/project/data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /opt/render/project/data
      - key: SECRET_KEY
        generateValue: true
      - key: ANTHROPIC_API_KEY
        sync: false
