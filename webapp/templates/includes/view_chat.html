<!-- Chat sidebar -->
<div id="chat-panel" class="chat-panel flex flex-col bg-white rounded-xl shadow-sm overflow-hidden">

  <div class="px-4 py-3 border-b border-gray-100 flex items-center justify-between flex-shrink-0">
    <h2 class="text-sm font-semibold text-gray-700">Assistant</h2>
    <button id="chat-close" class="text-gray-400 hover:text-gray-600 transition" title="Close">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
      </svg>
    </button>
  </div>

  <!-- Pinned instructions chip (sticky at top, shown when instructions are set) -->
  <div id="instructions-chip"
       class="hidden flex items-start gap-2 px-4 py-2.5 bg-amber-50 border-b-2 border-amber-300
              border-l-4 border-l-amber-500 text-xs text-amber-900 flex-shrink-0">
    <span class="flex-shrink-0 text-base leading-none mt-0.5" aria-hidden="true">📌</span>
    <div class="flex-1 min-w-0">
      <div class="font-bold text-amber-800 uppercase tracking-wide text-[10px] mb-0.5">Pinned instructions</div>
      <div id="instructions-chip-text" class="text-amber-900 font-medium break-words whitespace-pre-wrap leading-snug"></div>
    </div>
    {% if access != 'view' %}
    <button id="instructions-chip-edit"
            class="flex-shrink-0 text-amber-600 hover:text-amber-800 transition"
            title="Edit instructions">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
      </svg>
    </button>
    {% endif %}
  </div>

  <!-- Message list -->
  <div id="chat-messages" class="flex-1 overflow-y-auto px-4 py-3 space-y-3 text-sm">
    <!-- Populated by view.js from VIEW_DATA.chatHistory -->
  </div>

  <!-- Empty-chat tip (shown only when no chat history and no instructions) -->
  {% if access != 'view' %}
  <div id="chat-empty-tip"
       class="hidden mx-4 mb-2 px-3 py-2 rounded-lg bg-gray-50 border border-gray-200 text-xs text-gray-500">
    💡 Tip: pin recurring rules in
    <button id="chat-empty-tip-link"
            class="text-amber-600 hover:text-amber-700 underline underline-offset-2 transition">Instructions</button>
    to apply them every turn.
  </div>
  {% endif %}

  <!-- Input -->
  <div class="px-4 py-3 border-t border-gray-100 flex-shrink-0">
    <div class="flex gap-2">
      <textarea id="chat-input"
                class="flex-1 resize-none border border-gray-300 rounded-lg px-3 py-2 text-base
                       focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none"
                rows="2"
                placeholder="Ask a question or describe a visualization…"></textarea>
      <!-- Send button (idle state) -->
      <button id="chat-send"
              class="self-end px-3 py-2 bg-amber-500 text-white rounded-lg hover:bg-amber-600
                     disabled:opacity-40 disabled:cursor-not-allowed transition flex-shrink-0">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/>
        </svg>
      </button>
      <!-- Stop button (loading state) -->
      <button id="chat-stop"
              class="hidden self-end px-3 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600
                     transition flex-shrink-0" title="Stop (Esc)">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <p class="text-xs text-gray-400 mt-1">Shift+Enter for new line · Enter to send</p>
  </div>

</div>

<!-- Chat open button (when sidebar is closed) -->
<button id="chat-open"
        class="hidden fixed right-4 bottom-4 p-3 bg-blue-500 text-white rounded-full
               shadow-lg hover:bg-blue-600 transition z-10" title="Open assistant">
  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"/>
  </svg>
</button>
