<!-- Share modal -->
<div id="share-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center px-4">
  <div class="absolute inset-0 bg-black bg-opacity-40" id="share-backdrop"></div>
  <div class="relative bg-white rounded-xl shadow-xl w-full max-w-md p-6">

    <div class="flex items-center justify-between mb-4">
      <div>
        <h2 class="text-lg font-semibold text-gray-800">Share document</h2>
        <p id="share-doc-name" class="text-xs text-gray-400 mt-0.5"></p>
      </div>
      <button id="share-close" class="text-gray-400 hover:text-gray-600 transition">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>

    <!-- Tabs -->
    <div class="flex gap-1 border-b border-gray-200 mb-4">
      <button class="share-tab-btn px-3 py-1.5 text-sm font-medium text-amber-600 border-b-2 border-amber-500 -mb-px"
              data-tab="link">Link</button>
      <button class="share-tab-btn px-3 py-1.5 text-sm font-medium text-gray-400 hover:text-gray-600 border-b-2 border-transparent -mb-px transition"
              data-tab="people">People</button>
    </div>

    <!-- Link tab -->
    <div id="share-tab-link">
      <p class="text-xs text-gray-500 mb-3">Anyone with the link can view this document.</p>
      <div id="share-link-loading" class="hidden text-xs text-gray-400">Generating link…</div>
      <div id="share-link-area" class="hidden">
        <div class="flex gap-2 mb-3">
          <input id="share-link-input" type="text" readonly
                 class="flex-1 px-3 py-2 border border-gray-200 rounded-lg text-xs text-gray-600 bg-gray-50 outline-none">
          <button id="share-link-copy"
                  class="px-3 py-2 bg-amber-500 text-white rounded-lg text-xs font-medium hover:bg-amber-600 transition">
            Copy
          </button>
        </div>
      </div>
      <button id="share-create-link"
              class="w-full py-2 border border-dashed border-amber-300 text-amber-600 rounded-lg text-sm
                     hover:bg-amber-50 transition">
        + Generate link
      </button>
      <!-- Existing link shares -->
      <div id="share-link-list" class="mt-3 space-y-2"></div>
    </div>

    <!-- People tab -->
    <div id="share-tab-people" class="hidden">
      <p class="text-xs text-gray-500 mb-3">Share with a specific person by email.</p>
      <div class="relative mb-3">
        <input id="share-email-input" type="email" placeholder="Enter email address…"
               class="w-full px-3 py-2 border border-gray-300 rounded-lg text-sm
                      focus:ring-2 focus:ring-amber-400 focus:border-transparent outline-none">
        <div id="share-suggestions"
             class="hidden absolute top-full left-0 right-0 bg-white border border-gray-200
                    rounded-lg shadow-lg mt-1 z-10 max-h-40 overflow-y-auto"></div>
      </div>
      <button id="share-invite-btn"
              class="w-full py-2 bg-amber-500 text-white rounded-lg text-sm font-medium
                     hover:bg-amber-600 disabled:opacity-40 transition">
        Share
      </button>
      <!-- Existing user shares -->
      <div id="share-people-list" class="mt-3 space-y-2"></div>
    </div>

  </div>
</div>
