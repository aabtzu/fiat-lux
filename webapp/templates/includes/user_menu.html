{% set _u = user or current_user %}
{% if _u %}
{% set _initials = ((_u.display_name or _u.email)[:2])|upper %}
<div class="relative" id="user-menu-wrap">
  <button id="user-menu-btn"
          class="flex items-center gap-2 group">
    <span class="w-8 h-8 rounded-full bg-amber-500 text-white text-xs font-bold
                 flex items-center justify-center flex-shrink-0
                 group-hover:bg-amber-600 transition">{{ _initials }}</span>
    <span class="hidden sm:block text-sm text-gray-600 group-hover:text-gray-800 transition max-w-32 truncate">
      {{ _u.display_name or _u.email }}
    </span>
  </button>

  <!-- Dropdown -->
  <div id="user-menu-dropdown"
       class="hidden absolute right-0 top-full mt-2 w-52 bg-white rounded-xl shadow-lg
              border border-gray-100 py-1 z-50">
    <div class="px-4 py-2.5 border-b border-gray-100">
      {% if _u.display_name %}
        <p class="text-sm font-medium text-gray-800">{{ _u.display_name }}</p>
        <p class="text-xs text-gray-400 truncate">{{ _u.email }}</p>
      {% else %}
        <p class="text-sm font-medium text-gray-800 truncate">{{ _u.email }}</p>
      {% endif %}
    </div>
    <a href="{{ url_for('main.about') }}"
       class="flex items-center gap-2 px-4 py-2 text-sm text-gray-600 hover:bg-gray-50 transition">
      <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
      About Fiat Lux
    </a>
    <a href="{{ url_for('auth.logout') }}"
       class="flex items-center gap-2 px-4 py-2 text-sm text-red-500 hover:bg-red-50 transition">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
      </svg>
      Sign out
    </a>
  </div>
</div>

<script>
(function() {
  const btn  = document.getElementById('user-menu-btn');
  const menu = document.getElementById('user-menu-dropdown');
  btn.addEventListener('click', (e) => { e.stopPropagation(); menu.classList.toggle('hidden'); });
  document.addEventListener('click', () => menu.classList.add('hidden'));
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') menu.classList.add('hidden'); });
})();
</script>
{% endif %}
