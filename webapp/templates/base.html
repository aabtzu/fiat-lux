<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}FiatLux{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
  {% block extra_head %}{% endblock %}
</head>
<body class="{% block body_class %}min-h-screen bg-gradient-to-br from-slate-100 to-slate-200{% endblock %} antialiased">

  {% block content %}{% endblock %}

  <script src="{{ url_for('static', filename='js/app.js') }}" type="module"></script>
  {% block extra_scripts %}{% endblock %}

</body>
</html>
